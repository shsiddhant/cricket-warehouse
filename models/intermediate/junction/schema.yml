version: 2

models:
  - name: int_match_players
    columns:
      - name: match_id
        tests:
          - relationships:
              arguments:
                to: ref('int_matches')
                field: 'match_id'

      - name: format
        data_tests: [not_null]

      - name: team
        data_tests: [not_null]
      
      - name: player_name
        data_tests: [not_null]
    
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - match_id
              - player_id

