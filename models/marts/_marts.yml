
version: 2

models:
  - name: fct_batting_order
    description: "Table containing batting order of each innings."
    columns:
      - name: match_id
        data_tests:
          - relationships:
              arguments:
                to: ref('int_matches')
                field: 'match_id'

      - name: innings_number 
        data_tests: [not_null]
      
      - name: player
        data_tests: [not_null]
      
      - name: batting_position
        data_tests: [not_null]

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - match_id
              - innings_number
              - batting_position 

