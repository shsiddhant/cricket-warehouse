
version: 2

models:
  - name: fct_batting_order
    description: "Table containing batting order of each innings."
    columns:
      - name: match_id
        data_tests:
          - relationships:
              arguments:
                to: ref('int_matches')
                field: 'match_id'

      - name: innings_number 
        data_tests: [not_null]
      
      - name: player_name
        data_tests: [not_null]
      
      - name: batting_position
        data_tests: [not_null]

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - match_id
              - innings_number
              - batting_position 

  - name: fct_deliveries_sequence
    description: "Table containing deliveries sequence of each innings."
    columns:
      - name: match_id
        data_tests:
          - relationships:
              arguments:
                to: ref('int_matches')
                field: 'match_id'

      - name: innings_number 
        data_tests: [not_null]
      
      - name: ball_in_innings
        data_tests: [not_null]
      
      - name: batter
        data_tests: [not_null]

      - name: non_striker
        data_tests: [not_null]

      - name: bowler
        data_tests: [not_null]

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - match_id
              - innings_number
              - ball_in_innings

  - name: fct_dismissed_players
    description: "Table containing players dismissal info for each innings."
    columns:
      - name: match_id
        data_tests:
          - relationships:
              arguments:
                to: ref('int_matches')
                field: 'match_id'

      - name: innings_number 
        data_tests: [not_null]
      
      - name: player_out
        data_tests: [not_null] 
